name: DataDash Automated QA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm install && npx playwright install --with-deps

    - name: Run Scraper for 23f1002313@ds.study.iitm.ac.in
      run: node scraper.js
