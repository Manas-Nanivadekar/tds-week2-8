name: DevSync Daily Repository Update

on:
  schedule:
    # 17:22 IST = 11:52 UTC
    - cron: '52 11 * * *'
  workflow_dispatch: # Allows manual trigger for immediate verification

jobs:
  automated-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update activity log for 23f1002313@ds.study.iitm.ac.in
        run: |
          echo "Last automated update: $(date)" > daily_status.txt

      - name: Configure Git and Commit
        run: |
          git config --local user.email "23f1002313@ds.study.iitm.ac.in"
          git config --local user.name "DevSync Automation"
          git add daily_status.txt
          # The || true ensures the workflow doesn't fail if there are no changes to commit
          git commit -m "DevSync Daily Update: $(date +'%Y-%m-%d')" || exit 0
          git push
